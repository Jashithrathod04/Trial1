<!DOCTYPE html>
<html>

<head>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<style>
body{
 margin:0;
 overflow:hidden;
 background:black;
}

#container{
 width:100%;
 height:600px;
}
</style>

</head>

<body>

<div id="container"></div>

<script>

const container = document.getElementById("container");

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// Camera
const camera = new THREE.PerspectiveCamera(
75,
container.clientWidth/container.clientHeight,
0.1,
1000
);

camera.position.set(0,3,10);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);

container.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(5,10,7);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// Rocket
const geometry = new THREE.CylinderGeometry(0.5,0.5,5,32);
const material = new THREE.MeshStandardMaterial({color:0xffffff});

const rocket = new THREE.Mesh(geometry,material);

rocket.position.y = 2;

scene.add(rocket);

// Fire
const fireGeometry = new THREE.ConeGeometry(0.4,1.5,32);
const fireMaterial = new THREE.MeshBasicMaterial({color:0xff4500});

const fire = new THREE.Mesh(fireGeometry,fireMaterial);

fire.position.y = -3;

rocket.add(fire);

// Smoke
const smokeParticles = [];

for(let i=0;i<30;i++){

 const smokeGeo = new THREE.SphereGeometry(0.2,8,8);

 const smokeMat = new THREE.MeshBasicMaterial({
  color:0x888888,
  transparent:true,
  opacity:0.5
 });

 const particle = new THREE.Mesh(smokeGeo,smokeMat);

 particle.position.set(
  (Math.random()-0.5)*2,
  -3,
  (Math.random()-0.5)*2
 );

 scene.add(particle);

 smokeParticles.push(particle);
}

// Animation
let velocity = 0.05;
let gravity = 0.001;

function animate(){

 requestAnimationFrame(animate);

 // apply gravity
 velocity -= gravity;

 rocket.position.y += velocity;

 // if rocket reaches peak height
 if(rocket.position.y > 20){
     velocity = -0.03;
 }

 // when rocket comes back to ground
 if(rocket.position.y <= 2){
     rocket.position.y = 2;
     velocity = 0.05;  // restart launch
 }

 smokeParticles.forEach(p=>{

  p.position.y -= 0.05;

  if(p.position.y < -6){
   p.position.y = -3;
  }

 });

 renderer.render(scene,camera);

}

 smokeParticles.forEach(p=>{

  p.position.y -= 0.05;

  if(p.position.y < -6){
   p.position.y = -3;
  }

 });

 renderer.render(scene,camera);

}

animate();

</script>

</body>

</html>
